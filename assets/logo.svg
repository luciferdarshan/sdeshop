<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Definitions for Golden Gradients and Glow Effects -->
  <defs>
    <!-- Core Golden Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B31" />
      <stop offset="25%" stop-color="#E1BA5D" />
      <stop offset="50%" stop-color="#F9E090" />
      <stop offset="75%" stop-color="#E1BA5D" />
      <stop offset="100%" stop-color="#9A7B31" />
    </linearGradient>
    
    <!-- Secondary Bright Gold for highlights -->
    <linearGradient id="bright-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF3C4" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <!-- Drop Shadow and Glow -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#gold-glow)">
    <!-- Trident (Trishul) Body -->
    <!-- Central Prong (Sharp flame/spearhead) -->
    <path d="M 60 12 L 64 32 L 61.5 32 L 61.5 70 L 58.5 70 L 58.5 32 L 56 32 Z" fill="url(#gold-grad)" />
    
    <!-- Left Curved Prong -->
    <path d="M 58.5 50 C 40 50 35 36 35 25 C 35 26.5 36.5 31.5 40 34 C 45 37.5 52.5 39.5 58.5 40 Z" fill="url(#gold-grad)" />
    
    <!-- Right Curved Prong -->
    <path d="M 61.5 50 C 80 50 85 36 85 25 C 85 26.5 83.5 31.5 80 34 C 75 37.5 67.5 39.5 61.5 40 Z" fill="url(#gold-grad)" />
    
    <!-- Ornamental horizontal damru-like bindings -->
    <path d="M 55 50 C 55 48 65 48 65 50 C 65 52 55 52 55 50 Z" fill="url(#bright-gold)" />
    <path d="M 56 68 L 64 68 L 63 71 L 57 71 Z" fill="url(#bright-gold)" />
    
    <!-- Trishul Handle / Pole -->
    <rect x="59" y="71" width="2" height="18" rx="1" fill="url(#gold-grad)" />
    
    <!-- "SDE" Downside Text -->
    <text x="60" y="108" 
          font-family="'Outfit', 'Plus Jakarta Sans', sans-serif" 
          font-size="15" 
          font-weight="900" 
          letter-spacing="3" 
          fill="url(#bright-gold)" 
          text-anchor="middle">SDE</text>
  </g>
</svg>
